<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="متتبع القراءة">
<meta name="theme-color" content="#0b1120">
<title>متتبع القراءة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0b1120;--gold:#d4a843;--gold-dim:rgba(212,168,67,0.12);--gold-glow:rgba(212,168,67,0.2);
  --text:#e2ddd4;--text2:#a09888;--text3:#6b6050;--text4:#3d3528;
  --red:#ef6461;--yellow:#f0b429;--green:#57c785;--blue:#5b9cf4;--purple:#a78bfa;--orange:#fb923c;
  --surface:rgba(255,255,255,0.025);--border:rgba(255,255,255,0.06);
  --radius:14px;--radius-sm:10px;--radius-xs:7px;
  --font:'Tajawal','Noto Naskh Arabic',sans-serif;
  --font-ar:'Noto Naskh Arabic','Tajawal',serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.topbar{height:4px;background:linear-gradient(90deg,var(--red),var(--yellow),var(--green),var(--blue));opacity:0.6;position:sticky;top:0;z-index:50}
.wrap{max-width:680px;margin:0 auto;padding:16px 14px 90px}
.hdr{text-align:center;padding:14px 0 18px}
.hdr-bism{font-size:11px;color:var(--gold);letter-spacing:8px;font-family:var(--font-ar);opacity:0.7}
.hdr h1{font-size:22px;font-weight:800;color:var(--gold);margin:4px 0 2px;font-family:var(--font-ar);text-shadow:0 2px 24px var(--gold-glow)}
.hdr-sub{font-size:10px;color:var(--text3)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.bar{height:7px;border-radius:4px;background:rgba(255,255,255,0.05);overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.6s cubic-bezier(0.16,1,0.3,1)}
.bar-gold{background:linear-gradient(90deg,#c9a84c,#e8d48b)}
.mini-bar{height:3px;border-radius:2px;background:rgba(255,255,255,0.05);overflow:hidden}
.mini-fill{height:100%;border-radius:2px;opacity:0.5;transition:width 0.5s}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.3s;margin-bottom:10px}
.toggle-row.off{background:var(--surface);border:1px solid var(--border)}
.toggle-row.on{background:rgba(240,180,41,0.08);border:1px solid rgba(240,180,41,0.2)}
.sw{width:38px;height:20px;border-radius:10px;position:relative;transition:background 0.3s;flex-shrink:0}
.sw-thumb{width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:right 0.3s;box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.slot{border-radius:var(--radius);padding:14px;margin-bottom:8px;transition:opacity 0.3s}
.slot.skip{opacity:0.25}
.tbadge{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;font-family:monospace}
.done-btn{padding:5px 12px;border-radius:var(--radius-xs);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;border:none}
.done-btn:active{transform:scale(0.95)}
.bk{padding:10px;margin-bottom:3px;border-radius:var(--radius-sm);display:flex;align-items:stretch;gap:8px}
.bk-body{flex:1;min-width:0}
.bk-title{font-size:12px;font-weight:700;font-family:var(--font-ar);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bk-title.done{opacity:0.4;text-decoration:line-through}
.reorder-btn{border:none;background:rgba(255,255,255,0.04);color:var(--text3);width:24px;height:24px;border-radius:5px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
.reorder-btn:active{transform:scale(0.9);background:rgba(255,255,255,0.08)}
input[type=range]{-webkit-appearance:none;width:100%;height:36px;background:transparent;cursor:pointer;direction:ltr}
input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:3px;background:rgba(255,255,255,0.06)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;border-radius:50%;background:var(--gold);margin-top:-12px;box-shadow:0 2px 8px rgba(0,0,0,0.4)}
.qbtn{padding:6px 12px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit}
.qbtn:active{transform:scale(0.95)}
.qbtn.sel{background:var(--gold-dim);border-color:rgba(212,168,67,0.3);color:var(--gold)}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.insight-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center}
.week-row{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.week-bar-track{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,0.04);overflow:hidden}
.week-bar-fill{height:100%;border-radius:3px;transition:width 0.4s}
.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;padding:0;animation:fadeIn 0.2s}
@media(min-width:500px){.modal-bg{align-items:center;padding:16px}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal{background:#151d2e;border:1px solid rgba(212,168,67,0.15);border-radius:20px 20px 0 0;padding:20px 18px 30px;width:100%;max-width:440px;max-height:85vh;overflow-y:auto;animation:slideUp 0.25s cubic-bezier(0.16,1,0.3,1)}
@media(min-width:500px){.modal{border-radius:20px}}
.modal-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.12);margin:0 auto 14px}
.modal h3{font-size:15px;color:var(--gold);margin-bottom:14px;font-family:var(--font-ar)}
.field{margin-bottom:12px}
.field label{font-size:10px;color:var(--text2);display:block;margin-bottom:4px;font-weight:600}
.field input{width:100%;padding:10px 12px;border-radius:var(--radius-xs);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:var(--text);font-size:13px;font-family:inherit;outline:none}
.field input:focus{border-color:rgba(212,168,67,0.3)}
.diff-picker{display:flex;gap:5px;margin-bottom:12px}
.diff-opt{flex:1;padding:8px 0;border-radius:var(--radius-xs);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;border:1px solid}
.btn{padding:10px 16px;border-radius:var(--radius-xs);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border:none;width:100%;text-align:center}
.btn:active{transform:scale(0.98)}
.btn-gold{background:var(--gold-dim);color:var(--gold)}
.btn-green{background:rgba(87,199,133,0.15);color:var(--green)}
.btn-red{background:rgba(239,100,97,0.1);color:var(--red);border:1px solid rgba(239,100,97,0.15)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-sm{padding:6px 10px;font-size:10px;width:auto}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(11,17,32,0.95);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.06);display:flex;padding:6px 8px 6px;z-index:100}
@supports(padding-bottom:env(safe-area-inset-bottom)){.bnav{padding-bottom:env(safe-area-inset-bottom)}}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;border:none;background:transparent;color:var(--text3);font-size:9px;font-weight:600;cursor:pointer;font-family:inherit}
.bnav-btn.on{color:var(--gold)}
.bnav-icon{font-size:18px}
.footer{text-align:center;margin-top:20px;font-size:9px;color:var(--text4);font-family:var(--font-ar)}
</style>
</head>
<body>
<div class="topbar"></div>
<div class="wrap" id="app"></div>
<nav class="bnav" id="bnav"></nav>

<script>
// ═══ DATA ═══
var DEFAULT_CATS = [
  {id:"c1",name:"القرآن وعلومه",icon:"📖",color:"#34d399",books:[
    {id:"b1",title:"تفسير ابن جزي",totalPages:800,pagesRead:0,difficulty:"heavy"}
  ]},
  {id:"c2",name:"كتب العقيدة العامة",icon:"🕌",color:"#a78bfa",books:[
    {id:"b2",title:"شرح أصول اعتقاد أهل السنة والجماعة",totalPages:400,pagesRead:0,difficulty:"heavy"},
    {id:"b3",title:"الحجة في بيان المحجة – الأصبهاني",totalPages:400,pagesRead:0,difficulty:"heavy"},
    {id:"b4",title:"السنة – عبد الله بن أحمد",totalPages:350,pagesRead:0,difficulty:"medium"}
  ]},
  {id:"c3",name:"كتب توحيد العبادة",icon:"🔑",color:"#60a5fa",books:[
    {id:"b5",title:"المسلك الرشيد – سلطان العميري",totalPages:300,pagesRead:0,difficulty:"medium"},
    {id:"b6",title:"الأفعال المحتملة – سلطان العميري",totalPages:250,pagesRead:0,difficulty:"medium"},
    {id:"b7",title:"صيانة الإنسان من وسائس دحلان",totalPages:300,pagesRead:0,difficulty:"medium"}
  ]},
  {id:"c4",name:"كتب الزهد والسلوك",icon:"🤲",color:"#fbbf24",books:[
    {id:"b8",title:"الرسالة التبوكية",totalPages:80,pagesRead:0,difficulty:"light"},
    {id:"b9",title:"المجلد العاشر من مجموع الفتاوى",totalPages:350,pagesRead:0,difficulty:"medium"},
    {id:"b10",title:"قاعدة في المحبة",totalPages:120,pagesRead:0,difficulty:"light"},
    {id:"b11",title:"مختصر منهاج القاصدين",totalPages:350,pagesRead:0,difficulty:"medium"},
    {id:"b12",title:"الزهد – عبد الله بن المبارك",totalPages:250,pagesRead:0,difficulty:"light"}
  ]},
  {id:"c5",name:"كتب الآداب والأذكار",icon:"📿",color:"#2dd4bf",books:[
    {id:"b13",title:"مختصر الأذكار للنووي",totalPages:150,pagesRead:0,difficulty:"light"},
    {id:"b14",title:"الفصول لابن عقيل",totalPages:200,pagesRead:0,difficulty:"light"}
  ]},
  {id:"c6",name:"التاريخ والسير والتراجم",icon:"🏛️",color:"#f472b6",books:[
    {id:"b15",title:"سيرة ابن هشام",totalPages:600,pagesRead:0,difficulty:"medium"},
    {id:"b16",title:"البداية والنهاية (١٢–١٥)",totalPages:1600,pagesRead:0,difficulty:"heavy"},
    {id:"b17",title:"سير أعلام النبلاء – الذهبي (١–٣)",totalPages:1000,pagesRead:0,difficulty:"heavy"}
  ]},
  {id:"c7",name:"كتب الأدب",icon:"✒️",color:"#fb923c",books:[
    {id:"b18",title:"روضة العقلاء",totalPages:200,pagesRead:0,difficulty:"light"},
    {id:"b19",title:"الأخلاق والسير",totalPages:150,pagesRead:0,difficulty:"light"}
  ]}
];

var DM = {
  heavy: {label:"مركّز", color:"#ef6461", track:"A"},
  medium: {label:"متوسط", color:"#f0b429", track:"B"},
  light: {label:"خفيف", color:"#57c785", track:"C"}
};
var TM = {
  A: {label:"مركّز", color:"#ef6461", bg:"rgba(239,100,97,0.07)", bdr:"rgba(239,100,97,0.2)"},
  B: {label:"متوسط", color:"#f0b429", bg:"rgba(240,180,41,0.07)", bdr:"rgba(240,180,41,0.2)"},
  C: {label:"خفيف", color:"#57c785", bg:"rgba(87,199,133,0.07)", bdr:"rgba(87,199,133,0.2)"}
};
var DAYS_AR = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
var MONTHS_AR = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
var KEY = "qreader_v2";

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

var S = {cats: [], tired: false, view: "tonight", log: []};

function load() {
  try {
    var r = localStorage.getItem(KEY);
    if (r) { var d = JSON.parse(r); S.cats = d.cats || []; S.log = d.log || []; S.tired = d.tired || false; return; }
  } catch(e) {}
  S.cats = JSON.parse(JSON.stringify(DEFAULT_CATS));
  S.log = [];
}

function save() { try { localStorage.setItem(KEY, JSON.stringify({cats:S.cats, log:S.log, tired:S.tired})); } catch(e) {} }

function getToday() { return new Date().toISOString().slice(0, 10); }

// ═══ HELPERS ═══
function getStats() {
  var tb=0, cb=0, tp=0, tr=0;
  S.cats.forEach(function(c) { c.books.forEach(function(b) {
    tb++; tp += b.totalPages; tr += Math.min(b.pagesRead, b.totalPages);
    if (b.pagesRead >= b.totalPages) cb++;
  }); });
  var dr = Math.max(1, Math.ceil((new Date(2026,11,31) - new Date()) / 86400000));
  var rem = tp - tr;
  return {tb:tb, cb:cb, tp:tp, tr:tr, pct: tp > 0 ? (tr/tp*100) : 0, dr:dr, rem:rem, ppd: Math.ceil(rem/dr)};
}

function buildMix() {
  var tracks = {A:[], B:[], C:[]};
  S.cats.forEach(function(cat) { cat.books.forEach(function(b) {
    if (b.pagesRead >= b.totalPages) return;
    var entry = {id:b.id, title:b.title, totalPages:b.totalPages, pagesRead:b.pagesRead, difficulty:b.difficulty, catName:cat.name, catIcon:cat.icon, catColor:cat.color};
    tracks[DM[b.difficulty].track].push(entry);
  }); });
  var slots = [];
  ["A","B","C"].forEach(function(k) {
    if (tracks[k].length > 0) {
      var b = tracks[k][0];
      var rem = b.totalPages - b.pagesRead;
      var p = Math.min(10, rem);
      slots.push({track:k, id:b.id, title:b.title, totalPages:b.totalPages, pagesRead:b.pagesRead, difficulty:b.difficulty, catName:b.catName, catIcon:b.catIcon, catColor:b.catColor, fromPage:b.pagesRead+1, pages:p});
    }
  });
  return slots;
}

function nightTotal(slots) {
  var sum = 0;
  slots.forEach(function(sl) {
    if (S.tired && sl.track === "A") return;
    if (S.tired && sl.track === "B") { sum += Math.ceil(sl.pages * 0.5); return; }
    sum += sl.pages;
  });
  return sum;
}

function todayPages() { var d = getToday(); var s = 0; S.log.forEach(function(l) { if (l.date === d) s += l.pages; }); return s; }

function weekPages() {
  var now = new Date(); var dow = now.getDay();
  var start = new Date(now); start.setDate(start.getDate() - dow); start.setHours(0,0,0,0);
  var sStr = start.toISOString().slice(0,10);
  var s = 0; S.log.forEach(function(l) { if (l.date >= sStr) s += l.pages; }); return s;
}

function monthPages() { var prefix = getToday().slice(0,7); var s = 0; S.log.forEach(function(l) { if (l.date.indexOf(prefix) === 0) s += l.pages; }); return s; }

function logPagesAction(bookId, pages) {
  S.log.push({date: getToday(), bookId: bookId, pages: pages});
  S.cats.forEach(function(c) { c.books.forEach(function(b) { if (b.id === bookId) b.pagesRead = Math.min(b.totalPages, b.pagesRead + pages); }); });
  save();
}

function weekBreakdown() {
  var now = new Date(); var dow = now.getDay(); var days = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(now); d.setDate(d.getDate() - dow + i);
    var ds = d.toISOString().slice(0,10);
    var p = 0; S.log.forEach(function(l) { if (l.date === ds) p += l.pages; });
    days.push({day: DAYS_AR[i], date: ds, pages: p, isToday: ds === getToday()});
  }
  return days;
}

function monthBreakdown() {
  var months = {};
  S.log.forEach(function(l) {
    var m = l.date.slice(0,7);
    if (!months[m]) months[m] = {pages:0, books:{}};
    months[m].pages += l.pages;
    months[m].books[l.bookId] = true;
  });
  var result = [];
  Object.keys(months).sort().reverse().forEach(function(k) {
    var parts = k.split("-");
    result.push({key:k, name: MONTHS_AR[parseInt(parts[1])-1] + " " + parts[0], pages: months[k].pages, bookCount: Object.keys(months[k].books).length});
  });
  return result;
}

// ═══ DOM HELPER ═══
function h(tag, attrs) {
  var el = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(function(k) {
      var v = attrs[k];
      if (k === "style" && typeof v === "object") { Object.assign(el.style, v); }
      else if (k === "className") { el.className = v; }
      else if (k === "innerHTML") { el.innerHTML = v; }
      else if (k === "onClick") { el.addEventListener("click", v); }
      else if (k === "onInput") { el.addEventListener("input", v); }
      else { el.setAttribute(k, v); }
    });
  }
  for (var i = 2; i < arguments.length; i++) {
    var child = arguments[i];
    if (child == null || child === false) continue;
    if (Array.isArray(child)) {
      child.forEach(function(c) { if (c != null && c !== false) el.appendChild(typeof c === "string" ? document.createTextNode(c) : c); });
    } else {
      el.appendChild(typeof child === "string" ? document.createTextNode(child) : child);
    }
  }
  return el;
}

// ═══ RENDER ═══
function render() {
  var app = document.getElementById("app");
  app.innerHTML = "";
  var st = getStats();
  var slots = buildMix();

  // Header
  app.appendChild(h("div", {className:"hdr"},
    h("div", {className:"hdr-bism"}, "❖ بِسْمِ اللَّهِ ❖"),
    h("h1", null, "متتبع القراءة"),
    h("div", {className:"hdr-sub"}, st.tb + " كتاب · " + st.tp.toLocaleString() + " صفحة · الهدف: ٣١ ديسمبر ٢٠٢٦")
  ));

  // Progress
  var statsArr = [
    {v: st.tr.toLocaleString(), l: "صفحة قُرئت"},
    {v: st.rem.toLocaleString(), l: "صفحة متبقية"},
    {v: st.cb + "/" + st.tb, l: "كتب أُنجزت"},
    {v: "~" + st.ppd, l: "صفحة/يوم"}
  ];
  var statsEls = statsArr.map(function(x) {
    return h("div", {style:{textAlign:"center"}},
      h("div", {style:{fontSize:"15px",fontWeight:"800"}}, x.v),
      h("div", {style:{fontSize:"7.5px",color:"var(--text3)",marginTop:"1px"}}, x.l)
    );
  });
  app.appendChild(h("div", {className:"card"},
    h("div", {style:{display:"flex",justifyContent:"space-between",marginBottom:"6px"}},
      h("span", {style:{fontSize:"11px",color:"var(--gold)",fontWeight:"600"}}, "التقدم الكلي"),
      h("span", {style:{fontSize:"20px",fontWeight:"800",color:"var(--gold)"}}, Math.round(st.pct) + "%")
    ),
    h("div", {className:"bar"}, h("div", {className:"bar-fill bar-gold", style:{width: st.pct + "%"}})),
    h("div", {style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"2px",marginTop:"12px"}}, statsEls)
  ));

  // Tired toggle
  app.appendChild(h("div", {className: "toggle-row " + (S.tired ? "on" : "off"), onClick: function() { S.tired = !S.tired; save(); render(); }},
    h("div", null,
      h("div", {style:{fontSize:"12px",fontWeight:"700",color: S.tired ? "var(--yellow)" : "var(--text3)"}}, "😴 وضع الليلة المتعبة"),
      h("div", {style:{fontSize:"9px",color:"var(--text4)",marginTop:"1px"}}, S.tired ? "الخفيف + نصف المتوسط فقط" : "اضغط لتخفيف الورد")
    ),
    h("div", {className:"sw", style:{background: S.tired ? "var(--gold)" : "rgba(255,255,255,0.07)"}},
      h("div", {className:"sw-thumb", style:{right: S.tired ? "3px" : "21px"}})
    )
  ));

  // Render current view
  if (S.view === "tonight") renderTonight(app, slots);
  else if (S.view === "books") renderBooks(app);
  else if (S.view === "insights") renderInsights(app, st);
  else if (S.view === "settings") renderSettings(app);

  app.appendChild(h("div", {className:"footer"}, "❖ وفقك الله وبارك في وقتك ❖"));
  renderNav();
}

function renderNav() {
  var nav = document.getElementById("bnav");
  nav.innerHTML = "";
  var tabs = [
    {k:"tonight", icon:"🌙", label:"الليلة"},
    {k:"books", icon:"📚", label:"الكتب"},
    {k:"insights", icon:"📊", label:"إحصائيات"},

// ═══ TONIGHT VIEW ═══
function renderTonight(app, slots) {
  if (slots.length === 0) {

      h("div", {style:{fontSize:"28px",marginBottom:"8px"}}, "🎉"),
      h("div", {style:{fontSize:"15px",fontWeight:"700",color:"var(--gold)"}}, "ما شاء الله!"),
      h("div", {style:{fontSize:"11px",marginTop:"4px"}}, "تم إنهاء جميع الكتب")
    ));
    return;
  }

  // Quick stats
  var quickStats = [
    {v: todayPages(), l: "اليوم", c: "var(--green)"},
    {v: weekPages(), l: "الأسبوع", c: "var(--blue)"},
    {v: monthPages(), l: "الشهر", c: "var(--purple)"}
  ];
  app.appendChild(h("div", {style:{display:"flex",gap:"6px",marginBottom:"10px"}},
    quickStats.map(function(x) {
      return h("div", {style:{flex:"1",textAlign:"center",padding:"8px 4px",borderRadius:"var(--radius-sm)",background:"var(--surface)",border:"1px solid var(--border)"}},
        h("div", {style:{fontSize:"16px",fontWeight:"800",color:x.c}}, String(x.v)),
        h("div", {style:{fontSize:"7px",color:"var(--text3)",marginTop:"1px"}}, x.l + " ص")
      );
    })
  ));

  app.appendChild(h("div", {style:{textAlign:"center",marginBottom:"10px"}},
    h("div", {style:{fontSize:"13px",fontWeight:"700",color:"var(--gold)",fontFamily:"var(--font-ar)"}}, "🌙 ورد الليلة")
  ));

  slots.forEach(function(sl) {
    var tm = TM[sl.track];
    var isSkip = S.tired && sl.track === "A";
    var isHalf = S.tired && sl.track === "B";
    var pg = isSkip ? 0 : (isHalf ? Math.ceil(sl.pages * 0.5) : sl.pages);
    var pct = sl.totalPages > 0 ? (sl.pagesRead / sl.totalPages * 100) : 0;

    var doneButton = null;
    if (!isSkip) {
      doneButton = h("button", {className:"done-btn", style:{background:tm.color+"15",color:tm.color}, onClick: function() { logPagesAction(sl.id, pg); render(); }}, pg + " ص ✓");
    }

    var bottomContent = null;
    if (isSkip) {
      bottomContent = h("div", {style:{fontSize:"10px",color:"var(--yellow)",fontStyle:"italic"}}, "⏸ يُؤجّل — ليلة راحة");
    } else {
      bottomContent = h("div", null,
        h("div", {style:{display:"flex",justifyContent:"space-between",fontSize:"10px",color:"var(--text2)",marginBottom:"5px"}},
          h("span", null, "ص " + sl.fromPage + " – " + (sl.fromPage + pg - 1)),
          h("span", {style:{padding:"2px 7px",borderRadius:"4px",fontWeight:"700",fontSize:"10px",background:tm.color+"15",color:tm.color}}, pg + " صفحة")
        ),
        h("div", {className:"mini-bar"}, h("div", {className:"mini-fill", style:{width:pct+"%",background:tm.color}})),
        h("div", {style:{fontSize:"8px",color:"var(--text3)",marginTop:"2px",textAlign:"left",direction:"ltr"}}, sl.pagesRead + "/" + sl.totalPages)
      );
    }

    app.appendChild(h("div", {className: "slot " + (isSkip ? "skip" : ""), style:{background: isSkip ? "rgba(255,255,255,0.01)" : tm.bg, border: "1px solid " + (isSkip ? "rgba(255,255,255,0.03)" : tm.bdr)}},
      h("div", {style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}},
        h("div", {style:{display:"flex",alignItems:"center",gap:"8px"}},
          h("div", {className:"tbadge", style:{background:tm.color+"20",color:tm.color}}, sl.track),
          h("div", null,
            h("div", {style:{fontSize:"9px",fontWeight:"700",color:tm.color}}, tm.label),
            h("div", {style:{fontSize:"8px",color:"var(--text3)"}}, sl.catName)
          )
        ),
        doneButton
      ),
      h("div", {style:{fontSize:"14px",fontWeight:"700",marginBottom:"4px",fontFamily:"var(--font-ar)"}}, sl.catIcon + " " + sl.title),
      bottomContent

  });

  app.appendChild(h("div", {style:{textAlign:"center",marginTop:"8px",fontSize:"15px",fontWeight:"800",color:"var(--gold)"}}, "المجموع: " + nightTotal(slots) + " صفحة"));

// ═══ BOOKS VIEW ═══
function renderBooks(app) {
  S.cats.forEach(function(cat, ci) {
    var sec = h("div", {style:{marginBottom:"14px"}});
    var catRead = 0, catTotal = 0;
    cat.books.forEach(function(b) { catRead += Math.min(b.pagesRead, b.totalPages); catTotal += b.totalPages; });
    var catPct = catTotal > 0 ? Math.round(catRead / catTotal * 100) : 0;

    sec.appendChild(h("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:"5px",marginBottom:"5px",borderBottom:"1px solid " + cat.color + "18"}},

        h("span", {style:{fontSize:"12px",fontWeight:"800",color:cat.color,fontFamily:"var(--font-ar)"}}, cat.icon + " " + cat.name),

      ),
      h("button", {style:{border:"none",padding:"2px 8px",borderRadius:"5px",fontSize:"11px",cursor:"pointer",fontFamily:"inherit",fontWeight:"700",background:cat.color+"15",color:cat.color}, onClick: function() { openAddBook(cat.id); }}, "+ كتاب")
    ));

    cat.books.forEach(function(book, bi) {
      var pct = book.totalPages > 0 ? (Math.min(book.pagesRead, book.totalPages) / book.totalPages * 100) : 0;
      var isDone = book.pagesRead >= book.totalPages;
      var dm = DM[book.difficulty];
      var isFirst = bi === 0;
      var isLast = bi === cat.books.length - 1;

      sec.appendChild(h("div", {className:"bk", style:{background: isDone ? "rgba(87,199,133,0.03)" : "var(--surface)", border: "1px solid " + (isDone ? "rgba(87,199,133,0.12)" : "var(--border)")}},
        h("div", {style:{display:"flex",flexDirection:"column",gap:"2px",justifyContent:"center",flexShrink:"0"}},
          h("button", {className:"reorder-btn", style:{opacity: isFirst ? "0.2" : "1"}, onClick: (function(idx) { return function() { if (idx === 0) return; var tmp = cat.books[idx-1]; cat.books[idx-1] = cat.books[idx]; cat.books[idx] = tmp; save(); render(); }; })(bi)}, "▲"),
          h("button", {className:"reorder-btn", style:{opacity: isLast ? "0.2" : "1"}, onClick: (function(idx) { return function() { if (idx === cat.books.length - 1) return; var tmp = cat.books[idx+1]; cat.books[idx+1] = cat.books[idx]; cat.books[idx] = tmp; save(); render(); }; })(bi)}, "▼")
        ),
        h("div", {className:"bk-body"},
          h("div", {className: "bk-title " + (isDone ? "done" : "")}, book.title),
          h("div", {style:{display:"flex",alignItems:"center",gap:"5px",marginTop:"3px"}},
            h("span", {style:{fontSize:"8px",padding:"1px 5px",borderRadius:"3px",fontWeight:"700",background:dm.color+"15",color:dm.color}}, dm.label),
            h("span", {style:{fontSize:"8px",color:"var(--text3)"}}, Math.min(book.pagesRead, book.totalPages) + "/" + book.totalPages + " ص")
          ),
          h("div", {style:{marginTop:"5px"}}, h("div", {className:"mini-bar"}, h("div", {className:"mini-fill", style:{width:pct+"%",background: isDone ? "var(--green)" : cat.color}})))
        ),
        h("div", {style:{display:"flex",flexDirection:"column",gap:"3px",flexShrink:"0",justifyContent:"center"}},
          h("button", {style:{border:"none",padding:"4px 7px",borderRadius:"5px",fontSize:"9px",cursor:"pointer",fontFamily:"inherit",background:"rgba(212,168,67,0.1)",color:"var(--gold)",fontWeight:"600"}, onClick: (function(b) { return function() { openLogModal(b); }; })(book)}, "📝"),
          h("button", {style:{border:"none",padding:"4px 7px",borderRadius:"5px",fontSize:"9px",cursor:"pointer",fontFamily:"inherit",background:"rgba(255,255,255,0.03)",color:"var(--text3)"}, onClick: (function(cid, b) { return function() { openEditBook(cid, b); }; })(cat.id, book)}, "✏️")

// ═══ MODALS ═══
function showModal(title, content) {
  closeModal();
  var bg = h("div", {className:"modal-bg", onClick: function(e) { if (e.target === bg) closeModal(); }},
    h("div", {className:"modal", onClick: function(e) { e.stopPropagation(); }},
      h("div", {className:"modal-handle"}),
      h("h3", null, title),
      content
    )
  );
  document.body.appendChild(bg);
  document.body.style.overflow = "hidden";
}

function closeModal() {
  var m = document.querySelector(".modal-bg");
  if (m) m.remove();
  document.body.style.overflow = "";
}

function makeDiffPicker(sel, onChange) {
  var wrap = h("div", {className:"diff-picker"});
  ["heavy","medium","light"].forEach(function(k) {
    var v = DM[k];
    wrap.appendChild(h("button", {
      className: "diff-opt",
      style: {borderColor: sel === k ? v.color+"60" : v.color+"20", background: sel === k ? v.color+"15" : "transparent", color: sel === k ? v.color : "var(--text3)"},
      onClick: function() { onChange(k); }
    }, v.label));
  });
  return wrap;
}

function openLogModal(book) {
  var val = 0;
  var pct = book.totalPages > 0 ? (Math.min(book.pagesRead, book.totalPages) / book.totalPages * 100) : 0;
  var remaining = Math.max(0, book.totalPages - book.pagesRead);
  var maxSlider = Math.min(remaining, 100);

  var quickNums = [5, 10, 15, 20, 30, 50].filter(function(n) { return n <= remaining; });

  var content = h("div", null,
    h("div", {style:{fontSize:"14px",fontWeight:"700",marginBottom:"3px",fontFamily:"var(--font-ar)"}}, book.title),
    h("div", {style:{fontSize:"10px",color:"var(--text2)",marginBottom:"10px"}}, Math.min(book.pagesRead, book.totalPages) + " / " + book.totalPages + " صفحة (" + Math.round(pct) + "%)"),
    h("div", {className:"bar", style:{height:"5px",marginBottom:"14px"}}, h("div", {className:"bar-fill", style:{width:pct+"%",background:"var(--gold)"}})),

    // Slider section
    h("div", {style:{margin:"12px 0"}},
      h("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"8px"}},
        h("span", {style:{fontSize:"11px",color:"var(--text2)",fontWeight:"600"}}, "عدد الصفحات"),
        h("div", null,
          h("span", {style:{fontSize:"22px",fontWeight:"800",color:"var(--gold)",fontFamily:"monospace",direction:"ltr"}, id:"sv"}, "0"),
          h("span", {style:{fontSize:"9px",color:"var(--text3)"}}, " صفحة")
        )
      ),
      h("input", {type:"range", min:"0", max:String(maxSlider), value:"0", id:"ps", onInput: function(e) {
        val = parseInt(e.target.value);
        var disp = document.getElementById("sv");
        if (disp) disp.textContent = String(val);
      }})
    ),

    // Quick buttons
    h("div", {style:{display:"flex",gap:"4px",flexWrap:"wrap",marginTop:"8px"}},
      quickNums.map(function(n) {
        return h("button", {className:"qbtn", onClick: function(e) {
          val = n;
          var slider = document.getElementById("ps"); if (slider) slider.value = val;
          var disp = document.getElementById("sv"); if (disp) disp.textContent = String(val);
          document.querySelectorAll(".qbtn").forEach(function(b) { b.classList.remove("sel"); });
          e.target.classList.add("sel");
        }}, n + " ص");
      })
    ),

    h("div", {style:{height:"12px"}}),
    h("button", {className:"btn btn-green", onClick: function() {
      if (val > 0) { logPagesAction(book.id, val); closeModal(); render(); }
    }}, "+ إضافة صفحات"),

    h("div", {style:{borderTop:"1px solid var(--border)",marginTop:"14px",paddingTop:"12px",display:"flex",gap:"6px"}},
      h("button", {className:"btn btn-ghost btn-sm", onClick: function() { book.pagesRead = book.totalPages; save(); closeModal(); render(); }}, "✓ إنهاء الكتاب"),
      h("button", {className:"btn btn-red btn-sm", onClick: function() { book.pagesRead = 0; save(); closeModal(); render(); }}, "↺ من الصفر")
    ),

    // Direct page input
    h("div", {style:{marginTop:"12px"}},
      h("div", {className:"field"},
        h("label", null, "أو حدد الصفحة التي وصلت إليها"),
        h("input", {type:"number", id:"dp", placeholder: "الحالي: " + book.pagesRead, dir:"ltr", min:"0", max:String(book.totalPages)})
      ),
      h("button", {className:"btn btn-gold btn-sm", onClick: function() {
        var v = parseInt(document.getElementById("dp").value);
        if (!isNaN(v) && v >= 0) { book.pagesRead = Math.min(book.totalPages, v); save(); closeModal(); render(); }
      }}, "تحديث الصفحة")
    )
  );

  showModal("تسجيل القراءة", content);
}

function openAddBook(catId) {
  var diff = "medium";
  function build() {
    var content = h("div", null,
      h("div", {className:"field"}, h("label", null, "اسم الكتاب"), h("input", {id:"mt", placeholder:"مثال: رياض الصالحين"})),
      h("div", {className:"field"}, h("label", null, "عدد الصفحات"), h("input", {id:"mp", type:"number", placeholder:"300", dir:"ltr"})),
      h("div", null, h("label", {style:{fontSize:"10px",color:"var(--text2)",display:"block",marginBottom:"5px",fontWeight:"600"}}, "المستوى"))
    );
    content.appendChild(makeDiffPicker(diff, function(d) { diff = d; closeModal(); showModal("إضافة كتاب", build()); }));
    content.appendChild(h("button", {className:"btn btn-green", onClick: function() {
      var t = document.getElementById("mt").value.trim();
      var p = parseInt(document.getElementById("mp").value);
      if (!t || !p) return;
      var cat = S.cats.find(function(c) { return c.id === catId; });
      if (cat) cat.books.push({id:uid(), title:t, totalPages:p, pagesRead:0, difficulty:diff});
      save(); closeModal(); render();
    }}, "+ إضافة"));
    return content;
  }
  showModal("إضافة كتاب", build());
}

function openEditBook(catId, book) {
  var diff = book.difficulty;
  function build() {
    var content = h("div", null,
      h("div", {className:"field"}, h("label", null, "اسم الكتاب"), h("input", {id:"mt", value:book.title})),
      h("div", {className:"field"}, h("label", null, "عدد الصفحات"), h("input", {id:"mp", type:"number", value:String(book.totalPages), dir:"ltr"})),
      h("div", null, h("label", {style:{fontSize:"10px",color:"var(--text2)",display:"block",marginBottom:"5px",fontWeight:"600"}}, "المستوى"))
    );
    content.appendChild(makeDiffPicker(diff, function(d) { diff = d; closeModal(); showModal("تعديل الكتاب", build()); }));
    content.appendChild(h("div", {style:{display:"flex",gap:"6px"}},
      h("button", {className:"btn btn-gold", style:{flex:"1"}, onClick: function() {
        var t = document.getElementById("mt").value.trim();
        var p = parseInt(document.getElementById("mp").value);
        if (!t || !p) return;
        book.title = t; book.totalPages = p; book.difficulty = diff;
        save(); closeModal(); render();
      }}, "💾 حفظ"),
      h("button", {className:"btn btn-red btn-sm", onClick: function() {
        var cat = S.cats.find(function(c) { return c.id === catId; });
        if (cat) cat.books = cat.books.filter(function(b) { return b.id !== book.id; });
        save(); closeModal(); render();
      }}, "🗑 حذف")
    ));
    return content;
  }
  showModal("تعديل الكتاب", build());
}

  var content = h("div", null,
    h("div", {className:"field"}, h("label", null, "اسم القسم"), h("input", {id:"cn", placeholder:"مثال: كتب الفقه"})),
    h("div", {className:"field"}, h("label", null, "أيقونة"), h("input", {id:"ci", value:"📚"})),
    h("button", {className:"btn btn-green", onClick: function() {
      var n = document.getElementById("cn").value.trim();
      var icon = document.getElementById("ci").value || "📚";
      if (!n) return;
      S.cats.push({id:uid(), name:n, icon:icon, color:colors[Math.floor(Math.random()*colors.length)], books:[]});
      save(); closeModal(); render();
    }}, "+ إضافة")
  );
  showModal("إضافة قسم جديد", content);
}

// ═══ INIT ═══
load();
render();
</script>
</body>
